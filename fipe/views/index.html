<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta FIPE</title>
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Tabela FIPE</p>
        <h1>Descubra o valor atualizado do seu carro</h1>
        <p class="subtitle">Selecione marca, modelo e ano para consultar o preco de referencia em segundos.</p>
    </section>

    <section class="card">
        <div class="field-group">
            <label for="marca">Marca</label>
            <select id="marca" name="marca">
                <option value="">Selecione a marca</option>
            </select>
        </div>

        <div id="modelo-container" class="field-group" style="display: none;">
            <label for="modelo">Modelo</label>
            <select id="modelo" name="modelo">
                <option value="">Selecione o modelo</option>
            </select>
        </div>

        <div id="ano-container" class="field-group" style="display: none;">
            <label for="ano">Ano</label>
            <select id="ano" name="ano">
                <option value="">Selecione o ano</option>
            </select>
        </div>

        <button id="consultar" disabled>Consultar preco</button>
        <p id="status" class="status"></p>
        <div id="resultado" class="resultado"></div>
    </section>
</main>

<footer class="footer">
    <p>Desenvolvido por Thiago Nunes</p>
</footer>

<script src="script.js"></script>
</body>
</html>
